name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:
    inputs:
      fuzz_target:
        description: "Fuzz target to run"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - parse_str
          - format_source
      fuzz_runs:
        description: "Number of libFuzzer runs per fuzz target"
        required: false
        default: "1000"
      fuzz_seconds:
        description: "Optional max seconds per fuzz target; overrides fuzz_runs when set"
        required: false
        default: ""

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo fmt --check
        working-directory: rust
      - run: cargo clippy --workspace --exclude scon-fuzz --all-targets -- -D warnings
        working-directory: rust
      - run: cargo test --workspace --exclude scon-fuzz
        working-directory: rust
      - run: cargo build --workspace --exclude scon-fuzz --release
        working-directory: rust

  kotlin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew :scon-core:test :scon-kotlinx-serialization:test
        working-directory: kotlin

  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: go test ./...
        working-directory: go
      - run: go vet ./...
        working-directory: go

  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.0
      - run: pnpm install --frozen-lockfile
        working-directory: typescript
      - run: pnpm test
        working-directory: typescript
      - run: pnpm typecheck
        working-directory: typescript

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -e ".[test]"
        working-directory: python
      - run: python -m pytest
        working-directory: python

  java:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - run: mvn test
        working-directory: java

  idea-plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew :idea-plugin:buildPlugin
        working-directory: kotlin
      - run: ./gradlew :idea-plugin:verifyPlugin
        working-directory: kotlin

  fuzz-smoke:
    runs-on: ubuntu-latest
    env:
      FUZZ_TARGET: ${{ github.event.inputs.fuzz_target || 'all' }}
      FUZZ_RUNS: ${{ github.event.inputs.fuzz_runs || '1000' }}
      FUZZ_SECONDS: ${{ github.event.inputs.fuzz_seconds || '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      # cargo-fuzz 0.13.1's published lockfile pins rustix 0.36.x, which no
      # longer compiles on current nightly due reserved rustc_* attributes.
      - run: cargo install cargo-fuzz
      - name: Run fuzz smoke
        working-directory: rust
        run: |
          if [ -n "${FUZZ_SECONDS}" ]; then
            FUZZ_ARGS="-max_total_time=${FUZZ_SECONDS}"
          else
            FUZZ_ARGS="-runs=${FUZZ_RUNS}"
          fi

          run_target() {
            cargo +nightly fuzz run "$1" -- ${FUZZ_ARGS}
          }

          case "${FUZZ_TARGET}" in
            all)
              run_target parse_str
              run_target format_source
              ;;
            parse_str|format_source)
              run_target "${FUZZ_TARGET}"
              ;;
            *)
              echo "unknown fuzz target: ${FUZZ_TARGET}" >&2
              exit 2
              ;;
          esac
